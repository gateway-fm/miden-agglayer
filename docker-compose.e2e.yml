services:
  # ── L1 (Anvil with pre-deployed contracts) ─────────────────────────────────
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["sh", "-c"]
    command:
      - |
        # AggSender reads RollupManager state at RollupCreationBlockL1. Anvil
        # 1.7 retains only 3,600 historical states on disk by default, while a
        # full E2E pass (notably the real H6 timeout) mines beyond that window.
        # Keep enough history for the full pass plus the N=30 release gate.
        anvil --host=0.0.0.0 --chain-id=271828 --block-time=1 --base-fee=1 --max-persisted-states=12000 &
        ANVIL_PID=$$!
        sleep 2
        # Fund deployment accounts and replay contract deployment transactions
        sh /state/replay-txs.sh
        wait $$ANVIL_PID
    ports:
      - "127.0.0.1:8545:8545"
    volumes:
      - ./fixtures/l1-raw-txs.txt:/state/l1-raw-txs.txt:ro
      - ./scripts/replay-txs.sh:/state/replay-txs.sh:ro
    healthcheck:
      # NOTE: cast rpc returns a JSON string — '"0x"' — so the empty-code guard
      # must account for the quotes, else it false-positives on an empty chain
      # (bit us when a stale l1-raw-txs.txt mount skipped the replay: the stack
      # came up "healthy" with NO contracts and agglayer/aggkit crash-looped).
      test: ["CMD-SHELL", "cast rpc eth_getCode 0xC8cbEBf950B9Df44d987c8619f092beA980fF038 latest --rpc-url http://localhost:8545 2>/dev/null | grep -vE '^\"?0x\"?$$'"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s

  # ── Database (bridge-service) ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bridge_user
      POSTGRES_PASSWORD: bridge_password
      POSTGRES_DB: bridge_db
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge_user -d bridge_db"]
      interval: 2s
      timeout: 2s
      retries: 5

  # ── Database (miden-agglayer store) ────────────────────────────────────────
  agglayer-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agglayer
      POSTGRES_PASSWORD: agglayer
      POSTGRES_DB: agglayer_store
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agglayer -d agglayer_store"]
      interval: 2s
      timeout: 2s
      retries: 5

  # Migrations are run IN-PROCESS by the miden-agglayer proxy on startup
  # (see `src/store/migrator.rs`). The old `agglayer-migrate` one-shot
  # service is intentionally removed — its replacement embeds the SQL via
  # `include_str!` into the binary so the proxy and its schema cannot drift.

  # ── L2 Chain (Miden node — protocol 0.15 microservice topology) ─────────────
  # Protocol 0.15 decomposed the all-in-one `bundled` node into separate
  # services (mirrors 0xMiden/node's own docker-compose.yml):
  #   validator    — genesis bootstrap + block signing (:50101)
  #   sequencer    — block production + public RPC (:57291)  [service `miden-node`]
  #   ntx-builder  — consumes network-account notes, i.e. the agglayer bridge's
  #                  CLAIM/CONFIG notes, and submits them as network txs (:50301)
  #   tx-prover    — remote transaction prover (:50051)
  # Images are built from 0xMiden/node @ the rev pinned in the Makefile by
  # `make e2e-build-node` (tags: miden-node / miden-validator / miden-ntx-builder
  # / miden-remote-prover). Genesis is bootstrapped from our vendored agglayer
  # config (fixtures/genesis/02-with-account-files.toml → bridge + ETH/USDC
  # faucets); the bridge is deployed but left UNCONFIGURED — faucet registration
  # happens at runtime via the proxy's CONFIG_AGG_BRIDGE note.
  #
  # The ntx-builder authorises network-tx submission to the sequencer with a
  # shared secret that MUST match on both sides (sequencer
  # --rpc.network-tx-auth-header-value == ntx-builder --rpc.auth-header-value),
  # else network txs are rejected with "Network transactions may not be
  # submitted by users yet". The proxy submits ordinary user txs and needs no
  # such header.

  node-bootstrap-validator:
    image: miden-validator
    volumes:
      - node_data:/data
      - ./fixtures/genesis:/genesis:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f /data/validator/.bootstrapped ]; then echo "validator already bootstrapped"; exit 0; fi
        rm -rf /data/genesis /data/validator /data/accounts
        mkdir -p /data/genesis /data/validator /data/accounts
        miden-validator bootstrap \
          --data-directory /data/validator \
          --genesis-block-directory /data/genesis \
          --accounts-directory /data/accounts \
          --genesis-config-file /genesis/02-with-account-files.toml
        touch /data/validator/.bootstrapped

  node-bootstrap-sequencer:
    image: miden-node
    volumes:
      - node_data:/data
    entrypoint: ["/bin/sh", "-c"]
    depends_on:
      node-bootstrap-validator:
        condition: service_completed_successfully
    command:
      - |
        set -e
        if [ -f /data/node/.bootstrapped ]; then echo "node already bootstrapped"; exit 0; fi
        rm -rf /data/node
        mkdir -p /data/node
        miden-node bootstrap --data-directory /data/node --file /data/genesis/genesis.dat
        touch /data/node/.bootstrapped

  node-bootstrap-ntx:
    image: miden-ntx-builder
    volumes:
      - node_data:/data
    entrypoint: ["/bin/sh", "-c"]
    depends_on:
      node-bootstrap-validator:
        condition: service_completed_successfully
    command:
      - |
        set -e
        if [ -f /data/ntx-builder/.bootstrapped ]; then echo "ntx-builder already bootstrapped"; exit 0; fi
        rm -rf /data/ntx-builder
        mkdir -p /data/ntx-builder
        miden-ntx-builder bootstrap --data-directory /data/ntx-builder --file /data/genesis/genesis.dat
        touch /data/ntx-builder/.bootstrapped

  validator:
    image: miden-validator
    restart: on-failure
    volumes:
      - node_data:/data
    depends_on:
      node-bootstrap-validator:
        condition: service_completed_successfully
    command:
      - miden-validator
      - start
      - --listen=0.0.0.0:50101
      - --data-directory=/data/validator

  tx-prover:
    image: miden-remote-prover
    restart: on-failure
    command:
      - miden-remote-prover
      - --kind=transaction
      - --port=50051
      # The prover serves one proof at a time and rejects (not queues) excess
      # requests once `capacity` permits are taken — try_acquire => immediate
      # "proof queue is full". The default of 1 is too low here: the proxy (GER
      # notes + claims), the ntx-builder (B2AGG consumption) and the sequencer
      # (block proving) all hit this single prover concurrently, so a GER
      # injection gets rejected mid-deposit and the deposit never becomes
      # claimable. Allow requests to queue instead of failing.
      - --capacity=16

  # The sequencer is the RPC the proxy + aggkit talk to. Named `miden-node` so
  # the existing `--miden-node=http://miden-node:57291` wiring is unchanged.
  miden-node:
    image: miden-node
    restart: on-failure
    ports:
      - "127.0.0.1:57291:57291"
    environment:
      RUST_LOG: "info,miden_node_ntx_builder=debug"
    volumes:
      - node_data:/data
    depends_on:
      node-bootstrap-sequencer:
        condition: service_completed_successfully
      validator:
        condition: service_started
    command:
      - miden-node
      - sequencer
      - --rpc.listen=0.0.0.0:57291
      - --data-directory=/data/node
      - --validator.url=http://validator:50101
      - --ntx-builder.url=http://ntx-builder:50301
      - --rpc.network-tx-auth-header-value=${MIDEN_NTX_AUTH:-e2e-ntx-secret}

  ntx-builder:
    image: miden-ntx-builder
    restart: on-failure
    volumes:
      - node_data:/data
    depends_on:
      node-bootstrap-ntx:
        condition: service_completed_successfully
      miden-node:
        condition: service_started
      tx-prover:
        condition: service_started
    command:
      - miden-ntx-builder
      - start
      - --listen=0.0.0.0:50301
      - --rpc.url=http://miden-node:57291
      - --rpc.auth-header-value=${MIDEN_NTX_AUTH:-e2e-ntx-secret}
      - --tx-prover.url=http://tx-prover:50051
      - --data-directory=/data/ntx-builder

    # ── L2 EVM Proxy (service under test) ──────────────────────────────────────
  miden-agglayer:
    build:
      context: .
      dockerfile: Dockerfile
    # Tag the built image so the bridge-autoclaim service can reuse it without a
    # second build (the Rust auto-claimer ships in the same image).
    image: miden-agglayer-e2e:latest
    restart: on-failure
    ports:
      - "127.0.0.1:8546:8546"
    env_file:
      - ./fixtures/.env
    environment:
      CHAIN_ID: "${CHAIN_ID:-2}"
      NETWORK_ID: "${NETWORK_ID:-1}"
      DATABASE_URL: "host=agglayer-postgres user=agglayer password=agglayer dbname=agglayer_store"
      RUST_LOG: "info"
      # Regression requirement: offload ALL proxy tx proving (CLAIM / GER /
      # faucet / bridge-out / init) to an EXTERNAL Miden tx-prover instead of
      # the in-process LocalTransactionProver. Fallback-to-local stays OFF
      # (clap default false), so a prover outage fails loud rather than
      # silently reverting to local proving — that is how we *verify* the
      # external prover is actually exercised (assert
      # miden_proof_generations_total{outcome="ok"} > 0, no local fallback).
      MIDEN_PROVER_URL: "${MIDEN_PROVER_URL:-http://tx-prover:50051}"
      # Force all tmp I/O onto the bind-mounted dir so rocksdb / rusqlite
      # atomic-rename operations stay on the same device. Without this,
      # miden-client's on-disk store fails at startup with
      # "Invalid cross-device link".
      TMPDIR: /var/lib/miden-agglayer-service/tmp
      AGGLAYER_WRITER_QUEUE_DEPTH: "${AGGLAYER_WRITER_QUEUE_DEPTH:-64}"
      AGGLAYER_WRITER_TX_TTL: "${AGGLAYER_WRITER_TX_TTL:-300}"
      AGGLAYER_CLAIM_RECEIPT_EXPIRATION_BLOCKS: "${AGGLAYER_CLAIM_RECEIPT_EXPIRATION_BLOCKS:-120}"
      # Faucet-registry security reconciler (tripwire). Defaults match the CLI (30s × 3);
      # the tripwire e2e sets these short (e.g. 5s × 2) to observe the halt quickly.
      FAUCET_RECONCILER_POLL_SECS: "${FAUCET_RECONCILER_POLL_SECS:-30}"
      FAUCET_RECONCILER_GRACE_TICKS: "${FAUCET_RECONCILER_GRACE_TICKS:-3}"
      # Audit H6 — strict L1 GER corroboration, ON by default in the e2e stack
      # (the required production posture; merging the H6 code with the flag
      # off does not close the finding). Rejections are side-effect-free and
      # transient — the aggoracle's retry succeeds once the from-genesis L1
      # indexer (--l1-indexer-from-block=1 below) catches up, which on anvil
      # is seconds. e2e-ger-l1-verification.sh asserts both phases; override
      # with REJECT_UNVERIFIED_GER_INJECTION=false to run the lenient
      # (warn + metric only) mode, which makes that script SKIP itself.
      # Keep the evidence source in environment as well as the normal service
      # command. `docker compose run ... <one-shot flags>` replaces `command`,
      # but inherits environment; restore/recovery must therefore retain the
      # exact policy already bound to this database.
      L1_RPC_URL: "http://anvil:8545"
      GER_L1_ADDRESS: "0x1f7ad7caA53e35b4f0D138dC5CBF91aC108a2674"
      L1_INDEXER_FROM_BLOCK: "1"
      L1_EVIDENCE_TAG: "${L1_EVIDENCE_TAG:-latest}"
      REJECT_UNVERIFIED_GER_INJECTION: "${REJECT_UNVERIFIED_GER_INJECTION:-true}"
      # Shorten the H6 GER-evidence wait on the single-node Anvil e2e (default 15min).
      # A legit GER corroborates in ms; only a FORGED GER (e2e-ger-l1-verification.sh
      # Phase B) waits the full budget — twice — and would otherwise cost ~30min per
      # e2e run. Production keeps the finality-safe 15min default (unset).
      GER_EVIDENCE_WAIT_TIMEOUT_SECS: "${GER_EVIDENCE_WAIT_TIMEOUT_SECS:-30}"
    volumes:
      # Bind mount so `docker compose run --rm --no-deps miden-agglayer --restore`
      # shares the miden-client sqlite store + keystore + bridge_accounts.toml with
      # the main service container. A *named* volume trips sqlite's
      # "Invalid cross-device link" at startup because the rusqlite temp file
      # lives on a different device than the mount target; a bind mount keeps
      # everything on the host filesystem and sidesteps the rename boundary.
      - ./.miden-agglayer-data:/var/lib/miden-agglayer-service
    command:
      - "--port=8546"
      - "--miden-node=http://miden-node:57291"
      - "--miden-store-dir=/var/lib/miden-agglayer-service"
      - "--l1-rpc-url=http://anvil:8545"
      # finding #62 — per-origin-network RPC for Cantina #13 metadata recovery. An
      # L2B-origin (origin_network=2) token's ABI-metadata preimage must be fetched from
      # the L2B chain, not L1, or restore leaves its metadata Unrecoverable. Harmless on
      # the base stack (anvil-l2b absent → the entry is never looked up; recovery connects
      # lazily only when a network-2 faucet is actually rebuilt). Live on the l2l2 overlay.
      - "--network-rpc-url=2=http://anvil-l2b:8545"
      - "--ger-l1-address=0x1f7ad7caA53e35b4f0D138dC5CBF91aC108a2674"
      # Index L1 from genesis (block 1), not from L1 head. The kurtosis L1
      # snapshot already has the bridge deployed and its initial
      # UpdateL1InfoTree leaf emitted at a block BEFORE the proxy boots, and
      # the aggoracle injects that initial GER within seconds of startup. If
      # the indexer started at head it would never index that pre-head leaf,
      # leaving the startup GER permanently orphaned (RD-862 repro's
      # deterministic 0x133e6a88… orphan). Anvil's history is ~100s of blocks
      # so a from-genesis scan is trivial (max_range chunks it).
      - "--l1-indexer-from-block=1"
      # Audit H6 — the one frontier used by the entire L1 evidence scan.
      # Values: `latest`, `safe`, or `finalized`. Hardened deployments must use
      # `safe` or `finalized`; the single-node anvil e2e defaults to `latest`
      # for low latency and can be overridden to exercise either hardened tag.
      - "--l1-evidence-tag=${L1_EVIDENCE_TAG:-latest}"
      # Audit C2 — the signer default is now fail-closed: with no
      # `--allowed-signers` configured, `eth_sendRawTransaction` rejects EVERY
      # signer. The e2e stack's legitimate submitters (aggoracle/aggsender GER +
      # exit-root txs, bridge-autoclaim claims, loadtest deposits/claims) are
      # signed by keys derived from gitignored, per-setup-generated keystores —
      # their addresses are not stable or knowable at commit time, so a static
      # `--allowed-signers` list here cannot work. This proxy is bound to
      # loopback only (`127.0.0.1:8546`, see `ports:` above) with no external
      # ingress, which is exactly the documented-safe posture for the explicit
      # legacy open-mode opt-in. Restore open mode for the e2e so tx submission
      # is accepted. (`--require-hardening` is intentionally NOT set here, so
      # this flag does not trip the hardening gate.)
      - "--insecure-allow-any-signer"
      # R1 admin-auth key is supplied via the `ADMIN_API_KEY` env var
      # from `fixtures/.env`, generated fresh per setup by
      # scripts/setup-fixtures.sh (or scripts/ensure-e2e-secrets.sh on
      # quick-up paths). NEVER hardcode a key here — GitHub secret
      # scanning rightly flags it, and a fixed dev key drifts into
      # production deploys via copy-paste.
    depends_on:
      miden-node:
        condition: service_started
      tx-prover:
        condition: service_started
      agglayer-postgres:
        condition: service_healthy
    healthcheck:
      # #148: gate on the READINESS endpoint, not a bare eth_chainId. /health returns 200
      # only when the node is alive AND the historical claim-calldata repair backlog is 0;
      # it returns 503 while degraded/recovering, and `curl -sf` fails on that 503. So
      # `depends_on: service_healthy` now reflects the actual #148 readiness gate rather
      # than mere RPC liveness. In steady state the backlog is 0, so /health is 200 as soon
      # as the node finishes its initial sync.
      test: >-
        curl -sf http://localhost:8546/health
      interval: 3s
      timeout: 2s
      retries: 30
      # 240s: readiness (node-alive after initial sync + backlog drained) can take a touch
      # longer than a bare RPC bind; with the --init account redeploy + external-prover
      # handshake, give the first healthy check headroom so `up --wait` does not abort
      # dependents prematurely.
      start_period: 240s

  # ── Bridge Service ─────────────────────────────────────────────────────────
  bridge-service:
    # Patched image: /pending-bridges disambiguates the already-claimed check by
    # source rollup (see revitteth/zkevm-bridge-service#1). Built locally via
    # `docker buildx build -t zkevm-bridge-service:v0.6.4-RC2-pendingbridges`.
    image: zkevm-bridge-service:v0.6.4-RC2-pendingbridges
    entrypoint: ["/app/zkevm-bridge"]
    command: ["run", "--cfg", "/etc/zkevm/bridge-config.toml"]
    ports:
      - "127.0.0.1:18080:8080"
      - "127.0.0.1:19090:9090"
    volumes:
      - ./fixtures/bridge-config.toml:/etc/zkevm/bridge-config.toml:ro
      - ./fixtures/claimsponsor.keystore:/etc/zkevm/claimsponsor.keystore:ro
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_healthy
      miden-agglayer:
        condition: service_healthy

  # ── L2->L1 auto-claimer ────────────────────────────────────────────────────
  # Our standalone Rust bridge-autoclaim (NOT the upstream zkevm-autoclaimer —
  # Polygon declined the /pending-bridges fix). It discovers our rollup's exits
  # from the proxy's own synthetic BridgeEvent (eth_getLogs), gates on the L1
  # bridge's on-chain isClaimed, fetches proofs from the bridge-service GetClaim
  # path (/merkle-proof), and sponsors claimAsset on L1 (Anvil). Ships in the
  # same image as the proxy. See README "L2->L1 auto-claimer".
  #
  # SPONSOR_PRIVATE_KEY is injected via fixtures/.env (written by
  # scripts/ensure-sponsor-key.sh, which decrypts claimsponsor.keystore); it is
  # never a flag and never committed. BRIDGE_ADDRESS interpolates from
  # --env-file fixtures/.env (== L1 bridge == the address stamped on synthetic
  # BridgeEvents in this CDK deploy).
  bridge-autoclaim:
    image: miden-agglayer-e2e:latest
    restart: on-failure
    env_file:
      - ./fixtures/.env
    entrypoint: ["bridge-autoclaim"]
    command:
      - "--l2-rpc-url=http://miden-agglayer:8546"
      - "--l1-rpc-url=http://anvil:8545"
      - "--l1-bridge-address=${BRIDGE_ADDRESS}"
      - "--l2-bridge-address=${BRIDGE_ADDRESS}"
      - "--bridge-service-url=http://bridge-service:8080"
      - "--network-id=${NETWORK_ID:-1}"
      - "--poll-interval-secs=5"
      - "--cursor-db=/tmp/bridge-autoclaim-cursor.sqlite"
    depends_on:
      anvil:
        condition: service_healthy
      bridge-service:
        condition: service_started
      miden-agglayer:
        condition: service_healthy

  # ── AggLayer (certificate aggregation) ─────────────────────────────────────
  agglayer:
    image: europe-west2-docker.pkg.dev/prj-polygonlabs-devtools-dev/public/agglayer:0.4.4-remove-agglayer-prover
    restart: on-failure
    command: ["/usr/local/bin/agglayer", "run", "--cfg=/etc/agglayer/config.toml"]
    ports:
      - "127.0.0.1:4443:4443"
      - "127.0.0.1:4444:4444"
    environment:
      RUST_BACKTRACE: "1"
    volumes:
      - ./fixtures/agglayer-config.toml:/etc/agglayer/config.toml:ro
      - ./fixtures/aggregator.keystore:/etc/agglayer/aggregator.keystore:ro
      - agglayer_storage:/etc/agglayer/storage
      - agglayer_backups:/etc/agglayer/backups
    depends_on:
      anvil:
        condition: service_healthy

  # ── AggKit (aggoracle + aggsender) ─────────────────────────────────────────
  aggkit:
    image: ghcr.io/agglayer/aggkit:0.8.3-rc1
    restart: on-failure
    command: ["run", "--cfg=/etc/aggkit/config.toml", "--components=aggoracle,aggsender"]
    ports:
      - "127.0.0.1:5576:5576"
    volumes:
      - ./fixtures/aggkit-config.toml:/etc/aggkit/config.toml:ro
      - ./fixtures/aggoracle.keystore:/etc/aggkit/aggoracle.keystore:ro
      # aggsender signs L2->L1 certs with the sequencer key, which is the address
      # registered in the rollup's on-chain aggchain signer committee (threshold
      # 1). aggkit requires the cert proposer == committee[0], so the AggSender
      # key MUST be the sequencer (aggoracle is kept for L1->L2 GER injection).
      - ./fixtures/sequencer.keystore:/etc/aggkit/sequencer.keystore:ro
    depends_on:
      anvil:
        condition: service_healthy
      miden-agglayer:
        condition: service_healthy
      agglayer:
        condition: service_started

volumes:
  agglayer_storage:
  agglayer_backups:
  node_data:

networks:
  default:
    name: miden-e2e
