[Log]
Level = "info"
Environment = "development"
Outputs = ["stderr"]

[SyncDB]
Database = "postgres"
    [SyncDB.PgStorage]
    User = "bridge_user"
    Name = "bridge_db"
    Password = "bridge_password"
    Host = "postgres"
    Port = "5432"
    MaxConns = 20

[Etherman]
l1URL = "http://anvil:8545"
L2URLs = ["http://miden-agglayer:8546"]

[Synchronizer]
SyncInterval = "2s"
SyncChunkSize = 100
ForceL2SyncChunk = true

[BridgeController]
Height = 32

[BridgeServer]
GRPCPort = "9090"
HTTPPort = "8080"
DefaultPageLimit = 25
MaxPageLimit = 1000
FinalizedGEREnabled = true
    [BridgeServer.DB]
    Database = "postgres"
        [BridgeServer.DB.PgStorage]
        User = "bridge_user"
        Name = "bridge_db"
        Password = "bridge_password"
        Host = "postgres"
        Port = "5432"
        MaxConns = 20

