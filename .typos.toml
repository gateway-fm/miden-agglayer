# Config file for typos. For more information, see: https://github.com/crate-ci/typos
[files]
extend-exclude = ["*.lock", "dist", "target", "fixtures"]

[default.extend-words]
# Test fixture for constant_time_eq() — `abd` is intentionally a one-byte
# variant of `abc`, not a typo of `and`/`bad`.
abd = "abd"
# `mis` is intentional as in "mis-report" — `typos` mis-detects it as a
# misspelling of `miss` / `mist`.
mis = "mis"

[default.extend-identifiers]
# Commit SHA `dbe5c2d` is referenced throughout the v0.3.0 docs + code as
# the regression-of-record. typos parses the `dbe` prefix as a separate
# token and flags it; extend-identifiers tells typos to treat the whole
# token as a valid identifier.
dbe5c2d = "dbe5c2d"
dbe5c2d0fa68e97f4aefeba63d61d41cae7d7dc7 = "dbe5c2d0fa68e97f4aefeba63d61d41cae7d7dc7"
