[package]
description = "Miden AggLayer integration service"
edition = "2024"
exclude = [".github/"]
license = "MIT"
name = "miden-agglayer-service"
readme = "README.md"
rust-version = "1.93"
version = "0.1.0"

[[bin]]
name = "miden-agglayer-service"
path = "src/main.rs"

[[bin]]
name = "bridge-out-tool"
path = "src/bin/bridge_out_tool.rs"

[dev-dependencies]
tempfile = "3.10"

[profile.dev.package."*"]
opt-level = 1

[dependencies]
alloy = { features = [
  "consensus",
  "eips",
  "k256",
  "signers",
  "network",
], version = "1.5.2" }
alloy-core = { features = ["sol-types"], version = "1.5.2" }
alloy-rpc-types-eth = { version = "1.5.2" }

anyhow = { default-features = false, version = "1.0" }
async-trait = "0.1"
axum = { features = ["tokio"], version = "0.8" }
axum-jrpc = { path = "axum-jrpc" }
clap = { features = ["derive", "env"], version = "4.5" }
hex = { version = "0.4" }
metrics = { version = "0.24" }
metrics-exporter-prometheus = { version = "0.16", default-features = false }
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls",
] }
http = { version = "1.3" }
lru = { default-features = false, version = "0.16" }
parking_lot = { version = "0.12" }
# Direct dep so we can surgically clear stale `locked` flags in miden-client's
# sqlite when a full --reset-miden-store would be overkill. Version matches
# what miden-client-sqlite-store pulls in transitively.
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { features = ["derive"], version = "1.0" }
serde_json = { version = "1.0" }
sha3 = { version = "0.10" }
thiserror = { default-features = false, version = "2.0" }
tokio = { features = ["macros", "rt-multi-thread", "signal"], version = "1.48" }
toml = { version = "0.9" }
tower = { version = "0.5" }
tower-http = { features = ["cors", "limit", "set-header", "trace"], version = "0.6" }
tracing = { version = "0.1" }
tracing-subscriber = { features = [
  "env-filter",
  "fmt",
  "json",
], version = "0.3" }
url = { features = ["serde"], version = "2.5" }

# postgres (optional)
tokio-postgres = { version = "0.7", optional = true }
deadpool-postgres = { version = "0.14", optional = true }

# miden-base — loose caret pins. Pinning to `=0.14.4` exactly caused a runtime
# STARK verification regression in the miden-node NTX builder; the 0.14.6
# transitive node deps that cargo picks when left alone are what actually work
# with miden-client @ f7cdf26 in practice (confirmed by our first e2e-l1-to-l2
# pass). Keep the caret; rely on the git rev pin below for reproducibility.
miden-base-agglayer = { package = "miden-agglayer", version = "0.14" }
miden-protocol = { default-features = false, features = [
  "std",
], version = "0.14" }
miden-standards = { default-features = false, version = "0.14" }
miden-tx = { default-features = false, version = "0.14" }

# miden-client v0.14.4 (tagged release).
#
# Previously pinned to a commit on the `ajl-agglayer-integration-tests-v0.14.0` branch
# (rev f7cdf263). That rev expected `TransactionHeader.output_notes = repeated NoteSyncRecord`
# in proto-build 0.14.4–0.14.6 — a short-lived schema that miden-node v0.14.7+ reverted
# back to `repeated NoteHeader` (miden-node commit cf0a333a). Running our client against
# a v0.14.7+ server therefore produced `invalid wire type: SixtyFourBit (expected
# LengthDelimited)` decode failures on every `SyncTransactions` response.
#
# v0.14.4 of miden-client (which includes miden-client PR #2008 "detect erased notes")
# flipped its Rust decode path back to `Vec<NoteHeader>`, realigning client ↔ server.
# Cargo's semver resolution now pulls miden-node-proto-build 0.14.9, matching the server
# schema. The `ajl-agglayer-integration-tests-v0.14.0` branch only diverges in
# integration-test code (test_utils/common.rs behind the `testing` feature), so losing
# that branch does not affect miden-agglayer's library usage.
miden-client = { default-features = false, features = [
  "tonic",
], git = "https://github.com/0xMiden/miden-client.git", tag = "v0.14.4" }
miden-client-sqlite-store = { git = "https://github.com/0xMiden/miden-client.git", tag = "v0.14.4" }

[features]
default = []
postgres = ["dep:tokio-postgres", "dep:deadpool-postgres"]
