[package]
description = "Miden AggLayer integration service"
edition = "2024"
exclude = [".github/"]
license = "MIT"
name = "miden-agglayer-service"
readme = "README.md"
rust-version = "1.93"
version = "0.1.0"

[[bin]]
name = "miden-agglayer-service"
path = "src/main.rs"

[[bin]]
name = "bridge-out-tool"
path = "src/bin/bridge_out_tool.rs"

[dev-dependencies]
tempfile = "3.10"

[profile.dev.package."*"]
opt-level = 1

[dependencies]
alloy = { features = [
  "consensus",
  "eips",
  "k256",
  "signers",
  "network",
], version = "1.5.2" }
alloy-core = { features = ["sol-types"], version = "1.5.2" }
alloy-rpc-types-eth = { version = "1.5.2" }

anyhow = { default-features = false, version = "1.0" }
async-trait = "0.1"
axum = { features = ["tokio"], version = "0.8" }
axum-jrpc = { path = "axum-jrpc" }
clap = { features = ["derive", "env"], version = "4.5" }
hex = { version = "0.4" }
metrics = { version = "0.24" }
metrics-exporter-prometheus = { version = "0.16", default-features = false }
reqwest = { version = "0.12", default-features = false, features = [
  "json",
  "rustls-tls",
] }
http = { version = "1.3" }
lru = { default-features = false, version = "0.16" }
parking_lot = { version = "0.12" }
# Direct dep so we can surgically clear stale `locked` flags in miden-client's
# sqlite when a full --reset-miden-store would be overkill. Version matches
# what miden-client-sqlite-store pulls in transitively.
rusqlite = { version = "0.37", features = ["bundled"] }
serde = { features = ["derive"], version = "1.0" }
serde_json = { version = "1.0" }
sha3 = { version = "0.10" }
thiserror = { default-features = false, version = "2.0" }
tokio = { features = ["macros", "rt-multi-thread", "signal"], version = "1.48" }
toml = { version = "0.9" }
tower = { version = "0.5" }
tower-http = { features = [
  "cors",
  "limit",
  "set-header",
  "trace",
], version = "0.6" }
tower_governor = { version = "0.8" }
tracing = { version = "0.1" }
tracing-subscriber = { features = [
  "env-filter",
  "fmt",
  "json",
], version = "0.3" }
url = { features = ["serde"], version = "2.5" }

# postgres (optional)
tokio-postgres = { version = "0.7", optional = true }
deadpool-postgres = { version = "0.14", optional = true }

# miden-base — loose caret pins. Pinning to `=0.14.4` exactly caused a runtime
# STARK verification regression in the miden-node NTX builder; the 0.14.6
# transitive node deps that cargo picks when left alone are what actually work
# with miden-client @ f7cdf26 in practice (confirmed by our first e2e-l1-to-l2
# pass). Keep the caret; rely on the git rev pin below for reproducibility.
miden-base-agglayer = { package = "miden-agglayer", version = "0.14" }
miden-protocol = { default-features = false, features = [
  "std",
], version = "0.14" }
miden-standards = { default-features = false, version = "0.14" }
miden-tx = { default-features = false, version = "0.14" }

# miden-client — TEMPORARILY pinned to a personal fork that cherry-picks the
# `GrpcClient::with_header` patch needed for gateway bearer-auth, on top of a
# v0.14-line base. Upstream PR for the headers change:
#   https://github.com/0xMiden/miden-client/pull/2101
# That PR was merged into the v0.15-track `next` branch on 2026-04-29 and is
# NOT in any released v0.14.x. Pinning directly to upstream `next` doesn't
# work for this PR — it drags v0.15.0 of miden-protocol/miden-tx alongside
# our caret-pinned v0.14 of the same crates, producing duplicate types and
# E0308 mismatches. So we stay on the fork until upstream either backports
# #2101 to v0.14.7 OR we move the whole agglayer stack to v0.15.
#
# History: prior to PR #38 main was on `tag = "v0.14.4"`. Schema notes from
# that pin (proto-build 0.14.9, NoteHeader vs NoteSyncRecord) still apply —
# the fork base is `ajl-agglayer-integration-tests-v0.14.0` which is a v0.14
# integration-test branch; semver resolution still picks proto-build 0.14.9
# transitively, so client ↔ server stays aligned with the docker miden-node.
miden-client = { default-features = false, features = [
  "tonic",
], git = "https://github.com/revitteth/miden-client.git", rev = "a415fb7038251eb49aa9b384c640f04c41060a56" }
miden-client-sqlite-store = { git = "https://github.com/revitteth/miden-client.git", rev = "a415fb7038251eb49aa9b384c640f04c41060a56" }

[features]
default = []
postgres = ["dep:tokio-postgres", "dep:deadpool-postgres"]
