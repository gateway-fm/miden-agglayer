# L2->L2 e2e override (task #25): adds a second agglayer rollup ("l2b-sovereign",
# networkID 2, chainID 31338) backed by a plain anvil EVM chain, plus its own
# aggkit instance, swaps the agglayer config for a network-2-aware variant, and
# adds an ISOLATED per-rollup bridge-service + DB for L2B (the base bridge-service
# stays Miden-only — canonical AggKit topology, one bridge-service/DB per rollup).
#
# Usage (the config files this override mounts —
#   fixtures/{agglayer-config-l2l2,aggkit-l2b-config,bridge-config-l2b}.toml —
#   are GENERATED + gitignored, so generate them BEFORE `up`):
#   ./scripts/gen-l2b-configs.sh  # emits the three generated config files
#   docker compose -f docker-compose.e2e.yml -f docker-compose.l2l2.yml \
#     --env-file fixtures/.env up -d
#   ./scripts/setup-l2b.sh        # host-side: registers rollup #2 on L1 +
#                                 # deploys real sovereign bridge/GER on L2B
#                                 # (idempotent; also re-runs gen-l2b-configs)
#
# The snapshot's original rollup #1 was an OP-reth sovereign chain that the
# Miden proxy replaced; L2B mirrors the same AggchainECDSAMultisig consensus
# (mock-verifier), so a plain anvil chain is consensus-equivalent. See
# docs/l2-to-l2-notes.md for the full recipe + provenance.

services:
  # ── L2B: the second L2 chain (plain EVM devnet) ────────────────────────────
  anvil-l2b:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["sh", "-c"]
    command:
      - anvil --host=0.0.0.0 --chain-id=31338 --block-time=1 --base-fee=1
    ports:
      - "127.0.0.1:9545:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id --rpc-url http://localhost:8545"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s

  # ── aggkit #2: aggoracle (L1->L2B GER) + aggsender (L2B certs) ─────────────
  # NOTE: starts alongside the stack but only becomes useful after
  # scripts/setup-l2b.sh has registered rollup #2 + deployed the L2B bridge/GER;
  # until then it retries harmlessly (same startup pattern as aggkit #1).
  aggkit-l2b:
    image: ghcr.io/agglayer/aggkit:0.8.3-rc1
    restart: unless-stopped
    command: ["run", "--cfg=/etc/aggkit/config.toml", "--components=aggoracle,aggsender"]
    volumes:
      - ./fixtures/aggkit-l2b-config.toml:/etc/aggkit/config.toml:ro
      - ./fixtures/aggoracle.keystore:/etc/aggkit/aggoracle.keystore:ro
      # Same sequencer keystore as rollup #1: rollup #2's signer committee is
      # deliberately initialized to the same 0x5b06... key (setup-l2b.sh).
      - ./fixtures/sequencer.keystore:/etc/aggkit/sequencer.keystore:ro
    depends_on:
      anvil:
        condition: service_healthy
      anvil-l2b:
        condition: service_healthy
      agglayer:
        condition: service_started

  # ── config swaps: same services, network-2-aware configs ───────────────────
  agglayer:
    volumes:
      - ./fixtures/agglayer-config-l2l2.toml:/etc/agglayer/config.toml:ro
      - ./fixtures/aggregator.keystore:/etc/agglayer/aggregator.keystore:ro
      - agglayer_storage:/etc/agglayer/storage
      - agglayer_backups:/etc/agglayer/backups

  # ── L2B bridge-service + DB (ISOLATED, canonical per-rollup topology) ───────
  # Canonical AggKit runs ONE bridge-service + DB per rollup. The base
  # bridge-service (docker-compose.e2e.yml, :18080, DB `postgres`) stays
  # Miden-only; L2B gets its OWN bridge-service + postgres here, indexing L1 + L2B
  # ONLY (fixtures/bridge-config-l2b.toml, generated by gen-l2b-configs.sh) and
  # writing to its own bridge_db on postgres-l2b. This replaces the previous
  # single shared bridge-service that indexed both L2s in one DB.
  postgres-l2b:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bridge_user
      POSTGRES_PASSWORD: bridge_password
      POSTGRES_DB: bridge_db
    ports:
      - "127.0.0.1:5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bridge_user -d bridge_db"]
      interval: 2s
      timeout: 2s
      retries: 5

  bridge-service-l2b:
    image: zkevm-bridge-service:v0.6.4-RC2-pendingbridges
    entrypoint: ["/app/zkevm-bridge"]
    command: ["run", "--cfg", "/etc/zkevm/bridge-config.toml"]
    ports:
      - "127.0.0.1:28080:8080"
      - "127.0.0.1:29090:9090"
    volumes:
      - ./fixtures/bridge-config-l2b.toml:/etc/zkevm/bridge-config.toml:ro
      - ./fixtures/claimsponsor.keystore:/etc/zkevm/claimsponsor.keystore:ro
    depends_on:
      postgres-l2b:
        condition: service_healthy
      anvil:
        condition: service_healthy
      anvil-l2b:
        condition: service_healthy
      agglayer:
        condition: service_started
